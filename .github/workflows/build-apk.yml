name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# 最小权限原则 - 仅声明工作流实际需要的权限
permissions:
  contents: read

# 避免同一分支上的重复运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets
        working-directory: artifacts/mockup-sandbox
        env:
          BASE_PATH: "/"
        run: pnpm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Add Android platform
        working-directory: artifacts/mockup-sandbox
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: artifacts/mockup-sandbox
        run: npx cap sync android

      - name: Build debug APK
        working-directory: artifacts/mockup-sandbox/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v5
        with:
          name: sanctuary-debug-apk
          path: artifacts/mockup-sandbox/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

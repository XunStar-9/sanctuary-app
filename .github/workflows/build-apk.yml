name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets
        working-directory: artifacts/sanctuary-app
        env:
          BASE_PATH: "/"
        run: pnpm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        working-directory: artifacts/sanctuary-app
        run: npx cap --version

      - name: Add Android platform
        working-directory: artifacts/sanctuary-app
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: artifacts/sanctuary-app
        run: npx cap sync android

      - name: Build debug APK
        working-directory: artifacts/sanctuary-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sanctuary-debug-apk
          path: artifacts/sanctuary-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

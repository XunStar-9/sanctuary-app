name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642195f572a2b2b8e9349c4 # v4.4.0
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets
        working-directory: artifacts/sanctuary-app
        env:
          BASE_PATH: "/"
        run: pnpm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef2bebcd0 # v3.2.2

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: 21

      - name: Add Android platform
        working-directory: artifacts/sanctuary-app
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: artifacts/sanctuary-app
        run: npx cap sync android

      - name: Build debug APK
        working-directory: artifacts/sanctuary-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sanctuary-debug-apk
          path: artifacts/sanctuary-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

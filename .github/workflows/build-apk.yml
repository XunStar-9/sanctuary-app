name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets
        working-directory: artifacts/mockup-sandbox
        env:
          BASE_PATH: "/"
        run: pnpm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Verify Java version
        run: java -version

      - name: Add Android platform
        working-directory: artifacts/mockup-sandbox
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: artifacts/mockup-sandbox
        run: npx cap sync android

      - name: Build debug APK
        working-directory: artifacts/mockup-sandbox/android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sanctuary-debug-apk
          path: artifacts/mockup-sandbox/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

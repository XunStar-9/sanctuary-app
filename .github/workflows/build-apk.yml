name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# 最小权限原则 - 仅声明工作流实际需要的权限
permissions:
  contents: read

# 避免同一分支上的重复运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets
        working-directory: artifacts/mockup-sandbox
        env:
          BASE_PATH: "/"
        run: pnpm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Add Android platform
        working-directory: artifacts/mockup-sandbox
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: artifacts/mockup-sandbox
        run: npx cap sync android

      - name: Build debug APK
        working-directory: artifacts/mockup-sandbox/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: sanctuary-debug-apk
          path: artifacts/mockup-sandbox/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

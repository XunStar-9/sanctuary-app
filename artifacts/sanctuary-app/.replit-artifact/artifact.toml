kind = "web"
previewPath = "/"
title = "Sanctuary — Notes & Music"
version = "1.0.0"
id = "artifacts/sanctuary-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21973

[services.development]
run = "pnpm --filter @workspace/sanctuary-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sanctuary-app", "run", "build" ]
publicDir = "artifacts/sanctuary-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21973"
BASE_PATH = "/"
